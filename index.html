<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 金融投资情报看板</title>
<style>
:root {
  --bg-primary: #0b0d12;
  --bg-secondary: #12151e;
  --bg-card: #181c28;
  --bg-hover: #1e2335;
  --border-color: #252a3e;
  --text-primary: #e2e6f0;
  --text-secondary: #9198b0;
  --text-muted: #555c78;
  --accent: #10b981;
  --accent-dim: #065f46;
  --accent-glow: rgba(16,185,129,.12);
  --accent-strong: #34d399;
  --green: #10b981;
  --red: #ef4444;
  --gold: #f59e0b;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --font-stack: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  --radius: 10px;
  --radius-sm: 6px;
  --transition: .3s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-stack);
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  line-height:1.6;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-secondary)}
::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:3px}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,var(--bg-secondary) 0%,#0d101a 100%);
  border-bottom:1px solid var(--border-color);
  padding:24px 24px 14px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.header-inner{max-width:1200px;margin:0 auto}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;margin-bottom:8px;
}
.header-title{
  font-size:21px;font-weight:700;
  background:linear-gradient(90deg,var(--accent),var(--accent-strong));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:1px;
}
.header-title small{
  -webkit-text-fill-color:var(--text-muted);
  font-weight:400;font-size:13px;margin-left:10px;
}
.header-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent-dim);color:var(--accent-strong);
  padding:3px 14px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid var(--accent);
}
.header-badge::before{
  content:'';display:inline-block;width:7px;height:7px;
  background:var(--accent);border-radius:50%;
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.header-sub{
  font-size:13px;color:var(--text-muted);
  display:flex;flex-wrap:wrap;gap:12px 28px;margin-bottom:10px;
}
.header-sub .label{color:var(--text-muted)}
.header-sub .value{color:var(--text-secondary);font-weight:500}

/* ── KPI ROW ── */
.kpi-row{display:flex;flex-wrap:wrap;gap:8px}
.kpi-item{
  background:var(--bg-card);
  border:1px solid var(--border-color);
  border-radius:var(--radius-sm);
  padding:8px 16px;
  display:flex;align-items:center;gap:8px;
  font-size:12px;
  cursor:pointer;
  transition:all var(--transition);
  text-decoration:none;color:inherit;
}
.kpi-item:hover{
  border-color:var(--accent);
  background:var(--bg-hover);
  box-shadow:0 0 16px var(--accent-glow);
  transform:translateY(-2px);
}
.kpi-item .num{font-size:18px;font-weight:700;color:var(--accent-strong)}
.kpi-item .num-total{font-size:24px;color:var(--text-primary)}
.kpi-item .kpi-label{color:var(--text-muted);font-size:11px}
.kpi-item.kpi-total{cursor:default}
.kpi-item.kpi-total:hover{transform:none;box-shadow:none;border-color:var(--border-color);background:var(--bg-card)}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;flex-wrap:wrap;align-items:center;gap:8px;
  margin-top:8px;padding-top:6px;
  border-top:1px solid var(--border-color);
}
.toolbar-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--bg-card);border:1px solid var(--border-color);
  color:var(--text-secondary);padding:4px 12px;
  border-radius:var(--radius-sm);font-size:11px;
  cursor:pointer;transition:all var(--transition);
  font-family:var(--font-stack);
}
.toolbar-btn:hover{
  border-color:var(--accent);color:var(--accent-strong);
  background:var(--bg-hover);
}
.toolbar-btn.active{border-color:var(--accent);color:var(--accent-strong);background:var(--accent-glow)}
.toolbar-status{font-size:11px;color:var(--text-muted);margin-left:auto}
.toolbar-status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.toolbar-status .dot.live{background:var(--accent);animation:pulse-dot 2s ease-in-out infinite}
.toolbar-status .dot.stale{background:var(--gold)}

/* ── MAIN ── */
.main{max-width:1200px;margin:0 auto;padding:20px 24px}

/* ── Chart ── */
.chart-container{
  background:var(--bg-card);
  border:1px solid var(--border-color);
  border-radius:var(--radius);
  padding:18px 22px;
  margin-bottom:24px;
  display:flex;flex-wrap:wrap;align-items:center;gap:20px;
}
.chart-title{font-size:13px;color:var(--text-muted);font-weight:600;min-width:76px}
.chart-bars{display:flex;flex:1;gap:4px;align-items:flex-end;height:70px;min-width:180px}
.chart-bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;cursor:pointer;transition:opacity var(--transition);text-decoration:none}
.chart-bar-group:hover{opacity:.7}
.chart-bar{width:100%;max-width:44px;border-radius:3px 3px 0 0;transition:height .6s cubic-bezier(.34,1.56,.64,1);min-height:4px;position:relative}
.chart-bar-count{font-size:10px;font-weight:700;color:var(--text-secondary);position:absolute;top:-16px;left:50%;transform:translateX(-50%)}
.chart-bar-label{font-size:10px;color:var(--text-muted);white-space:nowrap;text-align:center}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary);cursor:pointer;transition:color var(--transition);text-decoration:none!important}
.legend-item:hover{color:var(--accent-strong)!important}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}

/* ── CATEGORY GRID ── */
.cat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:14px;
  margin-bottom:20px;
}
.cat-card{
  background:var(--bg-card);
  border:1px solid var(--border-color);
  border-radius:var(--radius);
  padding:18px;
  cursor:pointer;
  transition:all var(--transition);
  opacity:0;transform:translateY(10px);
  animation:fadeInUp .4s ease forwards;
  text-decoration:none;color:inherit;
}
.cat-card:hover{
  border-color:var(--accent-dim);
  background:var(--bg-hover);
  box-shadow:0 4px 24px var(--accent-glow);
  transform:translateY(-3px);
}
@keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
.cat-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cat-card-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.cat-card-title{font-size:15px;font-weight:600;color:var(--text-primary);flex:1}
.cat-card-count{font-size:22px;font-weight:700;color:var(--accent-strong);line-height:1}
.cat-card-count small{font-size:12px;color:var(--text-muted);font-weight:400}
.cat-card-preview{margin-top:6px}
.cat-card-item{
  display:flex;align-items:flex-start;gap:8px;
  font-size:12px;color:var(--text-secondary);
  padding:4px 0;border-bottom:1px solid var(--border-color);line-height:1.4;
}
.cat-card-item:last-child{border-bottom:none}
.cat-card-item-num{color:var(--text-muted);font-weight:600;flex-shrink:0;font-size:10px}
.cat-card-arrow{
  text-align:right;margin-top:10px;font-size:12px;color:var(--accent);
  display:flex;align-items:center;justify-content:flex-end;gap:4px;
}
.cat-card-arrow::after{content:'→';transition:transform var(--transition)}
.cat-card:hover .cat-card-arrow::after{transform:translateX(3px)}

/* ── DETAIL PAGE ── */
.detail-header{
  background:linear-gradient(135deg,var(--bg-secondary) 0%,#0d101a 100%);
  border-bottom:1px solid var(--border-color);
  padding:16px 24px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.detail-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:14px}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg-card);border:1px solid var(--border-color);
  color:var(--text-secondary);
  padding:7px 16px;border-radius:var(--radius-sm);
  font-size:12px;font-weight:600;
  cursor:pointer;transition:all var(--transition);
  text-decoration:none;white-space:nowrap;
}
.back-btn::before{content:'←';font-size:14px}
.back-btn:hover{border-color:var(--accent);color:var(--accent-strong);background:var(--bg-hover)}
.detail-title-area{flex:1}
.detail-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.detail-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.detail-info{font-size:11px;color:var(--text-muted);margin-top:2px}

/* ── ITEM CARD ── */
.item-card{
  background:var(--bg-card);
  border:1px solid var(--border-color);
  border-radius:var(--radius);
  padding:14px 18px;
  margin-bottom:8px;
  cursor:pointer;
  transition:all .25s ease;
  opacity:0;transform:translateY(10px);
  animation:fadeInUp .4s ease forwards;
}
.item-card:hover{
  border-color:var(--accent-dim);
  background:var(--bg-hover);
  box-shadow:0 0 20px var(--accent-glow);
}
.item-number{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;
  background:var(--bg-primary);
  border:1px solid var(--border-color);
  border-radius:5px;
  font-size:10px;font-weight:700;color:var(--text-muted);
  margin-right:8px;flex-shrink:0;
}
.item-title-row{display:flex;align-items:flex-start;gap:4px;margin-bottom:4px}
.item-title{font-size:14px;font-weight:600;color:var(--text-primary);line-height:1.5}
.item-title-link{cursor:pointer;color:var(--text-primary);text-decoration:none;transition:color .2s}
.item-title-link:hover{color:var(--accent-strong);text-decoration:underline}
.item-meta{display:flex;flex-wrap:wrap;align-items:center;gap:4px 12px;font-size:11px;margin-bottom:6px}
.item-source{color:var(--text-muted)}
.item-source::before{content:'📰 '}
.item-time{color:var(--text-muted)}
.item-time::before{content:'🕐 '}
.item-summary{font-size:12px;color:var(--text-secondary);line-height:1.6}
.item-tag{display:inline-block;font-size:9px;font-weight:600;padding:1px 7px;border-radius:3px;margin-right:6px}
.tag-bull{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.tag-neutral{background:rgba(245,158,11,.12);color:var(--gold);border:1px solid rgba(245,158,11,.3)}
.tag-bear{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.highlight{color:var(--accent-strong);font-weight:600;background:var(--accent-glow);padding:0 3px;border-radius:2px}

/* ── NEW BADGE ── */
.item-badge-new{
  display:inline-flex;align-items:center;gap:3px;
  background:linear-gradient(90deg,#059669,#10b981);
  color:#fff;font-size:10px;font-weight:700;
  padding:1px 8px;border-radius:4px;
  margin-left:8px;flex-shrink:0;
  box-shadow:0 0 8px rgba(16,185,129,.4);
  animation:newPulse 2s ease-in-out 3;
}
@keyframes newPulse{0%,100%{box-shadow:0 0 8px rgba(16,185,129,.4)}50%{box-shadow:0 0 16px rgba(16,185,129,.7)}}

/* ── SUMMARY EXPAND ── */
.item-summary{font-size:12px;color:var(--text-secondary);line-height:1.7}
.summary-text{display:inline;word-break:break-word}

/* ── FILTER BAR ── */
.filter-bar{
  display:flex;flex-wrap:wrap;align-items:center;gap:6px;
  padding:10px 18px;margin-bottom:12px;
  background:var(--bg-card);border:1px solid var(--border-color);
  border-radius:var(--radius-sm);
}
.filter-btn{
  padding:4px 12px;border:1px solid var(--border-color);
  background:transparent;color:var(--text-secondary);
  border-radius:4px;font-size:11px;cursor:pointer;
  font-family:var(--font-stack);transition:all var(--transition);
}
.filter-btn:hover{border-color:var(--accent-dim);color:var(--accent-strong)}
.filter-btn.active{border-color:var(--accent);color:var(--accent-strong);background:var(--accent-glow)}
.filter-count{font-size:11px;color:var(--text-muted);margin-left:auto}

/* ── TIME GROUP ── */
.time-group{margin-bottom:16px}
.time-group-label{
  font-size:11px;font-weight:600;color:var(--text-muted);
  padding:4px 0 8px;border-bottom:1px solid var(--border-color);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.time-group-label::after{content:'';flex:1;height:1px;background:var(--border-color)}
.empty-state{text-align:center;padding:60px 24px;color:var(--text-muted);font-size:14px}

.article-title-lg{font-size:18px;font-weight:700;color:var(--text-primary);line-height:1.5;margin-bottom:12px}
.article-meta{display:flex;flex-wrap:wrap;gap:8px 18px;font-size:12px;color:var(--text-muted);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-color)}
.article-meta .alabel{color:var(--text-muted)}
.article-meta .avalue{color:var(--text-secondary)}

.loading{text-align:center;padding:60px;color:var(--text-muted)}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;margin-top:12px}

/* ── HISTORY MODAL ── */
.history-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.history-overlay.show{display:flex}
.history-panel{
  background:var(--bg-secondary);border:1px solid var(--border-color);
  border-radius:var(--radius);padding:24px;width:90%;max-width:500px;
  max-height:80vh;overflow-y:auto;
}
.history-panel h3{font-size:16px;margin-bottom:16px;color:var(--text-primary)}
.history-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border:1px solid var(--border-color);
  border-radius:var(--radius-sm);margin-bottom:8px;
  cursor:pointer;transition:all var(--transition);
  background:var(--bg-card);
}
.history-item:hover{background:var(--bg-hover);border-color:var(--accent-dim)}
.history-item.active{border-color:var(--accent);background:var(--accent-glow)}
.history-date{font-weight:600;color:var(--text-primary)}
.history-count{font-size:12px;color:var(--text-muted)}
.history-close-btn{
  display:block;width:100%;margin-top:12px;
  padding:8px;border:1px solid var(--border-color);
  background:var(--bg-card);color:var(--text-secondary);
  border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-stack);font-size:12px;
}
.history-close-btn:hover{color:var(--accent-strong);border-color:var(--accent)}

/* ── FOOTER ── */
.footer{
  text-align:center;padding:20px;
  color:var(--text-muted);font-size:11px;
  border-top:1px solid var(--border-color);
  margin-top:16px;
}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* ── VIEW TOGGLE ── */
#homeView,#detailView,#articleView{display:none}
#homeView.active,#detailView.active,#articleView.active{display:block}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .header{padding:16px 12px 10px}
  .header-title{font-size:17px}
  .kpi-row{gap:6px}
  .kpi-item{padding:6px 10px;font-size:11px}
  .kpi-item .num-total{font-size:20px}.kpi-item .num{font-size:15px}
  .main{padding:12px}
  .cat-grid{grid-template-columns:1fr;gap:10px}
  .chart-container{padding:12px;flex-direction:column;align-items:stretch}
  .chart-bars{min-width:unset;height:55px}
  .item-card{padding:10px 12px}.item-title{font-size:13px}
  .detail-header{padding:12px}
  .toolbar{flex-wrap:wrap}
}
@media(max-width:480px){
  .header-sub{flex-direction:column;gap:3px}
  .item-meta{flex-direction:column;align-items:flex-start;gap:1px}
  .detail-header-inner{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ═══════ HOME VIEW ═══════ -->
<div id="homeView" class="active">

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-title">
        AI × 金融投资情报看板
        <small>· 协议驱动 · 数据实时</small>
      </div>
      <div class="header-badge" id="statusBadge">加载中...</div>
    </div>
    <div class="header-sub">
      <div><span class="label">时间窗：</span><span class="value" id="timeWindow">—</span></div>
      <div><span class="label">来源：</span><span class="value">AI HOT API + 公开资讯</span></div>
      <div><span class="label">更新于：</span><span class="value" id="generatedAt">—</span></div>
    </div>
    <div class="kpi-row">
      <div class="kpi-item kpi-total"><span class="num num-total" id="totalCount">0</span><span class="kpi-label">情报总数</span></div>
      <a class="kpi-item" href="#c1" id="kpiM1"><span class="num">0</span><span class="kpi-label">财报与估值</span></a>
      <a class="kpi-item" href="#c2" id="kpiM2"><span class="num">0</span><span class="kpi-label">融资并购</span></a>
      <a class="kpi-item" href="#c3" id="kpiM3"><span class="num">0</span><span class="kpi-label">市场竞争</span></a>
      <a class="kpi-item" href="#c4" id="kpiM4"><span class="num">0</span><span class="kpi-label">产业链 · 宏观</span></a>
      <a class="kpi-item" href="#c5" id="kpiM5"><span class="num">0</span><span class="kpi-label">投资策略</span></a>
      <a class="kpi-item" href="#c6" id="kpiM6"><span class="num">0</span><span class="kpi-label">AI 行业应用</span></a>
    </div>
    <div class="toolbar">
      <button class="toolbar-btn" onclick="refreshData()" title="重新拉取最新数据">🔄 刷新数据</button>
      <button class="toolbar-btn" onclick="showHistory()" title="查看历史数据快照">📅 历史快照</button>
      <span class="toolbar-status"><span class="dot live" id="statusDot"></span><span id="statusText">就绪</span></span>
    </div>
  </div>
</div>

<div class="main">
  <div class="chart-container">
    <div class="chart-title">分类分布</div>
    <div class="chart-bars" id="chartBars"></div>
    <div class="chart-legend" id="chartLegend"></div>
  </div>

  <div class="cat-grid" id="catGrid">
    <div class="loading"><div class="spinner"></div><div class="loading-text">正在加载数据...</div></div>
  </div>

  <div class="footer">
    数据来源：<a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer">AI HOT</a> · 雪球 · 新浪财经 · TechCrunch · WSJ ·
    最后更新：<span id="lastUpdated">—</span> ·
    <a href="#" onclick="refreshData();return false">点击刷新</a>获取最新数据
  </div>
</div>

</div><!-- /#homeView -->

<!-- ═══════ CATEGORY DETAIL VIEW ═══════ -->
<div id="detailView">
  <div class="detail-header">
    <div class="detail-header-inner">
      <a class="back-btn" href="#home">返回首页</a>
      <div class="detail-title-area">
        <div class="detail-title">
          <span class="detail-dot" id="detailDot"></span>
          <span id="detailTitle">—</span>
        </div>
        <div class="detail-info" id="detailInfo">—</div>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="filter-bar" id="detailFilter">
      <button class="filter-btn active" data-sort="time" onclick="setDetailFilter('time')">⏱ 按时间</button>
      <button class="filter-btn" data-sort="new" onclick="setDetailFilter('new')">🆕 只看新增</button>
      <span class="filter-count" id="detailFilterCount"></span>
    </div>
    <div id="detailContent">
      <div class="loading"><div class="spinner"></div><div class="loading-text">加载中...</div></div>
    </div>

function toBJ(iso){return new Date(new Date(iso).getTime()+8*3600000)}
function fmtRel(iso){
  var n=new Date(),nBJ=new Date(n.getTime()+8*3600000),bj=toBJ(iso);
  var d=nBJ-bj,min=Math.floor(d/60000),hr=Math.floor(d/3600000),day=Math.floor(d/86400000);
  var rel=min<1?"刚刚":min<60?min+" 分钟前":hr<24?hr+" 小时前":day<2?"昨天":day<7?day+" 天前":Math.floor(day/7)+" 周前";
  var Y=bj.getUTCFullYear(),M=String(bj.getUTCMonth()+1).padStart(2,"0"),D=String(bj.getUTCDate()).padStart(2,"0");
  var h=String(bj.getUTCHours()).padStart(2,"0"),m=String(bj.getUTCMinutes()).padStart(2,"0");
  return rel+" · "+Y+"-"+M+"-"+D+" "+h+":"+m;
}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+"…":s||""}

function getGlobalNum(catKey,idx){
  if(!DATA||!DATA.items)return idx+1;

  for(var i=0;i<CATS.length;i++){
    if(CATS[i].key===catKey)return n+idx+1;
    n+=DATA.items.filter(function(it){return it.category===CATS[i].key}).length;
  }
  return idx+1;
}

function getCatCount(key){

  return DATA.items.filter(function(it){return it.category===key}).length;
}

    {key:"c1",label:"公司财报与估值",color:"#ef4444"},
    {key:"c2",label:"融资、并购与IPO",color:"#f59e0b"},
    {key:"c3",label:"市场竞争格局",color:"#3b82f6"},
    {key:"c4",label:"产业链与宏观影响",color:"#8b5cf6"},
    {key:"c5",label:"投资策略与机构观点",color:"#10b981"},
    {key:"c6",label:"AI技术在金融行业的应用",color:"#06b6d4"}
  ];
  CAT_MAP = {};CATS.forEach(function(c){CAT_MAP[c.key]=c.label.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,"").slice(0,4)});
  renderAll();
}

function refreshData(){
  var grid=document.getElementById("catGrid");
  grid.innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-text">正在拉取最新数据...</div></div>';
  loadData(function(){
    updateStatus();
  });
}

function updateStatus(){
  var badge=document.getElementById("statusBadge");
  var dot=document.getElementById("statusDot");
  var txt=document.getElementById("statusText");
  if(IS_LIVE){
    badge.textContent="数据实时";
    badge.style.borderColor="var(--accent)";
    badge.style.color="var(--accent-strong)";
    dot.className="dot live";
    txt.textContent="实时数据 · "+DATA.items.length+" 条";
  }else{
    badge.textContent="离线备用";
    badge.style.borderColor="var(--gold)";
    badge.style.color="var(--gold)";
    dot.className="dot stale";
    txt.textContent="离线数据 · 部署后自动获取实时数据";
  }
}

// ═══════════ RENDER ═══════════
function renderAll(){
  if(!DATA)return;
  updateStatus();

  // Time
  var tw=DATA.timeWindow||{start:"",end:""};
  document.getElementById("timeWindow").textContent=(tw.start||"").slice(0,10)+" ~ "+(tw.end||"").slice(0,10);
  document.getElementById("generatedAt").textContent=(DATA.generatedAt||"").replace("T"," ").slice(0,16);
  document.getElementById("totalCount").textContent=DATA.totalCount||0;

  // KPIs
  CATS.forEach(function(cat,i){
    var el=document.getElementById("kpiM"+(i+1));
    if(el)el.querySelector(".num").textContent=getCatCount(cat.key);
  });

  // Chart
  renderChart();

  // Grid
  renderGrid();

  // Last updated
  var nu=new Date();
  document.getElementById("lastUpdated").textContent=
    nu.getFullYear()+"-"+String(nu.getMonth()+1).padStart(2,"0")+"-"+String(nu.getDate()).padStart(2,"0")+" "+
    String(nu.getHours()).padStart(2,"0")+":"+String(nu.getMinutes()).padStart(2,"0");
}

function renderChart(){
  var c=document.getElementById("chartBars");
  var l=document.getElementById("chartLegend");
  if(!c||!l)return;
  var max=1;
  CATS.forEach(function(cat){var n=getCatCount(cat.key);if(n>max)max=n;});

  var h="";
  CATS.forEach(function(cat){
    var n=getCatCount(cat.key),p=n/max*100;
    h+='<a href="#'+cat.key+'" class="chart-bar-group"><div class="chart-bar" style="height:'+p+'%;background:'+cat.color+'"><span class="chart-bar-count">'+n+'</span></div><span class="chart-bar-label">'+CAT_MAP[cat.key]+'</span></a>';
  });
  c.innerHTML=h;

  var lh="";
  CATS.forEach(function(cat){
    lh+='<a class="legend-item" href="#'+cat.key+'" style="color:inherit"><div class="legend-dot" style="background:'+cat.color+'"></div>'+CAT_MAP[cat.key]+'</a>';
  });
  l.innerHTML=lh;
}

function renderGrid(){
  var c=document.getElementById("catGrid");
  if(!c)return;
  var h="";
  CATS.forEach(function(cat,i){
    var items=(DATA.items||[]).filter(function(it){return it.category===cat.key});
    var cnt=items.length;
    var delay=i*80;
    h+='<a class="cat-card" href="#'+cat.key+'" style="animation-delay:'+delay+'ms">';
    h+='<div class="cat-card-header"><div class="cat-card-dot" style="background:'+cat.color+'"></div><div class="cat-card-title">'+cat.label+'</div><div class="cat-card-count">'+cnt+' <small>条</small></div></div>';
    if(cnt>0){
      h+='<div class="cat-card-preview">';
      items.slice(0,2).forEach(function(it,idx){
        h+='<div class="cat-card-item"><span class="cat-card-item-num">#'+getGlobalNum(cat.key,idx)+'</span><span>'+trunc(it.title,48)+'</span></div>';
      });
      h+='</div>';
    }else{h+='<div class="cat-card-preview"><div class="cat-card-item"><span style="color:var(--text-muted)">暂无相关情报</span></div></div>';}
    h+='<div class="cat-card-arrow">查看全部 '+cnt+' 条情报</div></a>';
  });
  c.innerHTML=h;
}

// ═══════════ NEW ITEM DETECTION ═══════════
var NEW_URLS = {};  // Map of new item URLs -> title

function loadNewItems(prevDay, callback){
  NEW_URLS = {};
  if(!prevDay){
    // Try loading the previous day's snapshot
    var yesterday = new Date();
    yesterday.setDate(yesterday.getDate()-1);
    var yStr = yesterday.getFullYear()+"-"+String(yesterday.getMonth()+1).padStart(2,"0")+"-"+String(yesterday.getDate()).padStart(2,"0");
    
    fetch("data/"+yStr+".json?"+Date.now())
      .then(function(r){return r.json()})
      .then(function(prev){
        detectNewFromSnapshot(prev);
        if(callback)callback();
      })
      .catch(function(){if(callback)callback();});
  }else{
    detectNewFromSnapshot(prevDay);
    if(callback)callback();
  }
}

function detectNewFromSnapshot(prevData){
  if(!prevData||!prevData.items)return;
  var prevUrls={};
  prevData.items.forEach(function(it){prevUrls[it.url]=true});
  (DATA.items||[]).forEach(function(it){
    if(!prevUrls[it.url]) NEW_URLS[it.url]=true;
  });
}

// ═══════════ CATEGORY DETAIL ═══════════
var DETAIL_FILTER = "time";

function setDetailFilter(mode){
  DETAIL_FILTER = mode;
  var btns = document.querySelectorAll("#detailFilter .filter-btn");
  btns.forEach(function(b){b.classList.toggle("active",b.dataset.sort===mode)});
  renderCategory(CURRENT_CAT);
}

var CURRENT_CAT = null;

function renderCategory(catKey){
  CURRENT_CAT = catKey;
  var cat=CATS.find(function(c){return c.key===catKey});
  if(!cat)return;
  var allItems=(DATA.items||[]).filter(function(it){return it.category===catKey});
  document.getElementById("detailDot").style.background=cat.color;
  document.getElementById("detailTitle").textContent=cat.label;
  document.getElementById("detailInfo").textContent="共 "+allItems.length+" 条情报 · 实时数据";

  // Apply filter
  var items = DETAIL_FILTER==="new"
    ? allItems.filter(function(it){return !!NEW_URLS[it.url]})
    : allItems.slice();
  
  // Sort by time (newest first)
  items.sort(function(a,b){return(b.publishedAt||"").localeCompare(a.publishedAt||"")});

  // Update filter count
  document.getElementById("detailFilterCount").textContent = 
    DETAIL_FILTER==="new"
      ? "新增 "+items.length+" 条 / 共 "+allItems.length+" 条"
      : "共 "+items.length+" 条";

  var con=document.getElementById("detailContent");
  if(items.length===0){
    con.innerHTML='<div class="empty-state"><p>'+(DETAIL_FILTER==="new"?"暂无新增情报":"暂无相关情报")+'</p></div>';
    return;
  }

  // Group by time periods
  var groups = {today:[],yesterday:[],week:[],older:[]};
  var now = new Date(), todayStr = now.toDateString();
  var yest = new Date(now); yest.setDate(yest.getDate()-1);
  var yestStr = yest.toDateString();
  var weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate()-7);

  items.forEach(function(it){
    var d = new Date(it.publishedAt||0);
    var ds = d.toDateString();
    if(ds === todayStr) groups.today.push(it);
    else if(ds === yestStr) groups.yesterday.push(it);
    else if(d > weekAgo) groups.week.push(it);
    else groups.older.push(it);
  });

  var groupLabels = {
    today:"今天",
    yesterday:"昨天", 
    week:"最近 7 天",
    older:"更早"
  };

  var h="";
  var globalIdx = 0;
  ["today","yesterday","week","older"].forEach(function(gk){
    var gItems = groups[gk];
    if(!gItems.length)return;
    h+='<div class="time-group"><div class="time-group-label">'+groupLabels[gk]+'</div>';
    gItems.forEach(function(it){
      var gn = getGlobalNum(catKey, allItems.indexOf(it));
      globalIdx++;
      var time=fmtRel(it.publishedAt||"");
      var fullSum = it.summary||it.title||"";
      var tag=it.tag||"", tagClass=it.tagClass||"tag-neutral";
      var isNew = !!NEW_URLS[it.url];
      var delay=(globalIdx%20)*40;
      
      var jsonData = JSON.stringify({title:it.title,url:it.url,source:it.source,publishedAt:it.publishedAt,summary:it.summary,category:it.category,tag:it.tag,tagClass:it.tagClass}).replace(/"/g,'&quot;');
      h+='<div class="item-card" style="animation-delay:'+delay+'ms" data-item=\''+jsonData+'\' role="button" tabindex="0">'
        +'<div class="item-title-row">'
        +'<span class="item-number">'+gn+'</span>'
        +'<div class="item-title">'+(it.title||"")+'</div>'
        +(isNew?'<span class="item-badge-new">🆕 NEW</span>':'')
        +'</div>'
        +'<div class="item-meta">'
        +'<span class="item-source">'+(it.source||"")+'</span>'
        +'<span class="item-time">'+time+'</span>'
        +'</div>'
        +'<div class="item-summary">'
        +(tag?'<span class="item-tag '+tagClass+'">'+tag+'</span>':'')
        +'<span class="summary-text" id="sum_'+gn+'">'+fullSum+'</span>'
        +'</div>'
        +'</div>';
    });
    h+='</div>';
  });
  con.innerHTML=h;

  // Always show full text - no collapsing needed
}

// ═══════════ ARTICLE DETAIL MODAL ═══════════
// Event delegation: catch clicks on .item-card inside #detailContent
document.addEventListener("click", function(e){
  // Walk up to find the item-card
  var card = e.target;
  while(card && card !== document && !card.classList.contains("item-card")) card=card.parentNode;
  if(!card || card===document || !card.dataset || !card.dataset.item) return;
  try {
    var item = JSON.parse(card.dataset.item);
  } catch(er) { return; }
  if(!item) return;
  showArticle(item);
});

// ═══════════ ARTICLE VIEW ═══════════
var CURRENT_ARTICLE = null;
var PREV_HASH = "home";

function showArticle(item){
  CURRENT_ARTICLE = item;
  // Save current hash for back navigation
  PREV_HASH = location.hash.replace("#","") || "home";
  if(PREV_HASH==="home"||!PREV_HASH) PREV_HASH="home";
  else if(PREV_HASH.startsWith("c")) PREV_HASH=PREV_HASH; // keep category hash
  else PREV_HASH="home";
  location.hash = "article";
}

function goBackFromArticle(){
  location.hash = PREV_HASH || "home";
}

function renderArticle(item){
  if(!item) return;
  document.getElementById("articleViewLabel").textContent = "📄 内容详情";
  var con = document.getElementById("articleViewContent");
  var time = fmtRel(item.publishedAt||"");
  var tag = item.tag||"", tagClass=item.tagClass||"tag-neutral";
  var catLabel = "";
  if(CATS) CATS.forEach(function(c){if(c.key===item.category) catLabel=c.label});
  con.innerHTML = ""
    +'<div class="article-title-lg">'+(item.title||"")+'</div>'
    +'<div class="article-meta" style="margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border-color)">'
    +'  <span><span class="alabel">来源：</span><span class="avalue">'+(item.source||"—")+'</span></span>'
    +'  <span><span class="alabel">时间：</span><span class="avalue">'+time+'</span></span>'
    +'  <span><span class="alabel">分类：</span><span class="avalue">'+catLabel+'</span></span>'
    +(tag?'  <span><span class="alabel">标签：</span><span class="item-tag '+tagClass+'">'+tag+'</span></span>':'')
    +'</div>'
    +'<div style="font-size:14px;color:var(--text-secondary);line-height:1.9;white-space:pre-wrap;word-break:break-word;margin-bottom:20px">'+(item.summary||item.title||"")+'</div>';
}

// ═══════════ HISTORY ═══════════
function showHistory(){
  var overlay=document.getElementById("historyOverlay");
  var list=document.getElementById("historyList");
  overlay.classList.add("show");
  list.innerHTML='<div class="loading-text">加载历史...</div>';

  fetch("data/history.json?"+Date.now())
    .then(function(r){return r.json()})
    .then(function(history){
      if(!history||!history.length){
        list.innerHTML='<div style="color:var(--text-muted);text-align:center;padding:20px">暂无历史快照</div>';
        return;
      }
      var h="";
      history.reverse().forEach(function(entry){
        h+='<div class="history-item" onclick="loadSnapshot(\''+entry.date+'\')"><span class="history-date">'+entry.date+'</span><span class="history-count">'+entry.totalCount+' 条</span></div>';
      });
      list.innerHTML=h;
    })
    .catch(function(){
      list.innerHTML='<div style="color:var(--text-muted);text-align:center;padding:20px">无法加载历史数据</div>';
    });
}

function hideHistory(){
  document.getElementById("historyOverlay").classList.remove("show");
}

function loadSnapshot(date){
  fetch("data/"+date+".json?"+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){
      setData(d, true);
      hideHistory();
      document.getElementById("statusBadge").textContent="历史快照";
      document.getElementById("statusBadge").style.borderColor="var(--gold)";
      document.getElementById("statusBadge").style.color="var(--gold)";
      document.getElementById("statusDot").className="dot stale";
      document.getElementById("statusText").textContent="快照: "+date;
    })
    .catch(function(){
      alert("无法加载该日期的快照");
    });
}

// ═══════════ ROUTER ═══════════
function navigate(){
  var hash=location.hash.replace("#","")||"home";
  var homeView=document.getElementById("homeView");
  var detailView=document.getElementById("detailView");
  var articleView=document.getElementById("articleView");
  if(hash==="home"){
    homeView.classList.add("active");
    detailView.classList.remove("active");
    articleView.classList.remove("active");
    document.title="AI 金融投资情报看板";
    window.scrollTo({top:0,behavior:"smooth"});
    if(DATA)renderAll();
  }else if(hash==="article"){
    homeView.classList.remove("active");
    detailView.classList.remove("active");
    articleView.classList.add("active");
    document.title=(CURRENT_ARTICLE&&CURRENT_ARTICLE.title?"📄 "+CURRENT_ARTICLE.title.slice(0,30)+"…":"内容详情")+" — AI 金融投资情报看板";
    if(CURRENT_ARTICLE) renderArticle(CURRENT_ARTICLE);
    window.scrollTo({top:0,behavior:"smooth"});
  }else{
    var cat=CATS.find(function(c){return c.key===hash});
    if(cat){
      homeView.classList.remove("active");
      detailView.classList.add("active");
      document.title=cat.label+" — AI 金融投资情报看板";
      // Reset filter to time view
      DETAIL_FILTER = "time";
      var btns = document.querySelectorAll("#detailFilter .filter-btn");
      btns.forEach(function(b){b.classList.toggle("active",b.dataset.sort==="time")});
      if(DATA){
        loadNewItems(null,function(){renderCategory(hash)});
      }
      window.scrollTo({top:0,behavior:"smooth"});
    }else{location.hash="home";}
  }
}

// ═══════════ INIT ═══════════
loadData(function(){
  navigate();
});
window.addEventListener("hashchange",navigate);
})();
</script>
